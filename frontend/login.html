<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Parking Booking</title>

</head>
<body class="bg-[#0f172a] h-screen flex items-center justify-center font-sans antialiased">
  <div class="bg-[#1e293b] p-8 rounded-xl shadow-2xl border border-slate-700 w-full max-w-sm">
    <h2 class="text-2xl font-bold text-center text-slate-100 mb-8">System Login</h2>
    <form id="login-form" class="flex flex-col gap-5">
      <div>
        <label class="block text-xs font-bold text-slate-400 mb-1">USERNAME</label>
        <input type="text" id="username" class="w-full bg-[#0f172a] border border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-blue-500" required>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-400 mb-1">EMAIL ADDRESS</label>
        <input type="email" id="email" class="w-full bg-[#0f172a] border border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-blue-500" required>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-400 mb-1">PASSWORD</label>
        <input type="password" id="password" class="w-full bg-[#0f172a] border border-slate-600 rounded px-4 py-2 text-slate-200 focus:outline-none focus:border-blue-500" required>
      </div>
      <button type="submit" class="mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded transition-colors shadow-lg">Login</button>
      <a href="/admin.html" class="mt-2 text-center text-sm font-semibold text-slate-500 hover:text-blue-400 transition-colors">Login as Admin</a>
    </form>
  </div>
  <script type="module" src="/src/login.js"></script>
</body>
</html>
